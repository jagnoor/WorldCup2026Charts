function cvtTime(t,off){
  let h,mi=0;
  if(t==='12a')h=0;
  else if(t.endsWith('a')){h=parseInt(t)}
  else if(t.includes(':')){const p=t.replace(/p$/,'').split(':');h=parseInt(p[0]);mi=parseInt(p[1]);if(h!==12)h+=12}
  else if(t.endsWith('p')){h=parseInt(t);if(h!==12)h+=12}
  else return[t,0];
  // Work in total minutes for half-hour offset support
  let totalMin=h*60+mi+Math.round(off*60);
  let ds=0;
  while(totalMin<0){totalMin+=1440;ds--}
  while(totalMin>=1440){totalMin-=1440;ds++}
  h=Math.floor(totalMin/60);mi=totalMin%60;
  let r;
  if(h===0)r=mi?'12:'+String(mi).padStart(2,'0')+'a':'12a';
  else if(h<12)r=mi?h+':'+String(mi).padStart(2,'0')+'a':h+'a';
  else if(h===12)r=mi?'12:'+String(mi).padStart(2,'0')+'p':'12p';
  else{const x=h-12;r=mi?x+':'+String(mi).padStart(2,'0')+'p':x+'p'}
  return[r,ds];
}
function shiftDt(d,s){
  if(!s)return d;
  const p=d.split('/');let mo=+p[0],dy=+p[1];dy+=s;
  const dim={6:30,7:31};
  if(dy<1){mo--;dy+=dim[mo]||30}
  else if(dy>(dim[mo]||30)){dy-=dim[mo]||30;mo++}
  return mo+'/'+dy;
}
function fmt24(t){
  if(CLOCK!=='24')return t;
  let h,mi=0;
  if(t==='12a'){h=0}
  else if(t.endsWith('a')){
    if(t.includes(':')){const p=t.replace(/a$/,'').split(':');h=parseInt(p[0]);mi=parseInt(p[1]);if(h===12)h=0}
    else{h=parseInt(t);if(h===12)h=0}
  }else if(t.endsWith('p')){
    if(t.includes(':')){const p=t.replace(/p$/,'').split(':');h=parseInt(p[0]);mi=parseInt(p[1]);if(h!==12)h+=12}
    else{h=parseInt(t);if(h!==12)h+=12}
  }else if(t.includes(':')){
    const p=t.split(':');h=parseInt(p[0]);mi=parseInt(p[1]);if(h!==12)h+=12
  }else return t;
  return h+':'+String(mi).padStart(2,'0');
}

function buildBH(seeds,matches,x0,y0,dir,sfBias){
  const sYs=[];let y=y0;
  for(let i=0;i<seeds.length;i++){
    sYs.push(y);
    if(i%2===1&&i<seeds.length-1)y+=bH*0.3;
    if(i%4===3&&i<seeds.length-1)y+=bGap;
    if(i%8===7&&i<seeds.length-1)y+=bBigGap;
    y+=bH;
  }
  let x=x0;
  for(let i=0;i<seeds.length;i++){
    if(dir===1){bTxt(x-2,sYs[i],seeds[i],18,bGC,'end');bLn(x,sYs[i],x+bLL,sYs[i]);}
    else{bTxt(x+2,sYs[i],seeds[i],18,bGC,'start');bLn(x-bLL,sYs[i],x,sYs[i]);}
  }
  x+=dir*bLL;
  const r32=[];
  for(let i=0;i<seeds.length;i+=2){const m=(sYs[i]+sYs[i+1])/2;r32.push(m);bLn(x,sYs[i],x,sYs[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[0][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const r16=[];
  for(let i=0;i<r32.length;i+=2){const m=(r32[i]+r32[i+1])/2;r16.push(m);bLn(x,r32[i],x,r32[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[1][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const qf=[];
  for(let i=0;i<r16.length;i+=2){const m=(r16[i]+r16[i+1])/2;qf.push(m);bLn(x,r16[i],x,r16[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[2][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const sfMid=(qf[0]+qf[1])/2;const sfOut=qf[0]+(qf[1]-qf[0])*sfBias;
  bLn(x,qf[0],x,qf[1]);bLn(x,sfOut,x+dir*bLL*1.2,sfOut);
  bTxt(x-dir*11,sfMid,'#'+matches[3][0],16,bTC,dir===1?'end':'start');
  x+=dir*bLL*1.2;
  return{sfY:sfOut,sfX:x,botY:sYs[sYs.length-1]};
}

function svgBracketToCanvas(svgEl){
  const w=parseInt(svgEl.getAttribute('width'));
  const vb=svgEl.getAttribute('viewBox').split(' ').map(Number);
  const vbW=vb[2],vbH=vb[3];
  const scaleF=2;
  const canvas=document.createElement('canvas');
  canvas.width=Math.ceil(vbW*scaleF);
  canvas.height=Math.ceil(vbH*scaleF);
  const ctx=canvas.getContext('2d');
  ctx.scale(scaleF,scaleF);
  ctx.translate(-vb[0],-vb[1]);
  function drawRoundRect(cx,x,y,w,h,r){cx.beginPath();if(cx.roundRect){cx.roundRect(x,y,w,h,r)}else{cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y)}cx.closePath()}
  // Draw all rects
  svgEl.querySelectorAll('rect').forEach(rect=>{
    const rx=parseFloat(rect.getAttribute('rx'))||0;
    const x=parseFloat(rect.getAttribute('x'));
    const y=parseFloat(rect.getAttribute('y'));
    const rw=parseFloat(rect.getAttribute('width'));
    const rh=parseFloat(rect.getAttribute('height'));
    ctx.fillStyle=rect.getAttribute('fill');
    ctx.strokeStyle=rect.getAttribute('stroke')||'transparent';
    ctx.lineWidth=parseFloat(rect.getAttribute('stroke-width'))||0;
    ctx.beginPath();drawRoundRect(ctx,x,y,rw,rh,rx);ctx.fill();if(ctx.lineWidth>0)ctx.stroke();
  });
  // Draw all lines
  svgEl.querySelectorAll('line').forEach(ln=>{
    ctx.beginPath();
    ctx.moveTo(parseFloat(ln.getAttribute('x1')),parseFloat(ln.getAttribute('y1')));
    ctx.lineTo(parseFloat(ln.getAttribute('x2')),parseFloat(ln.getAttribute('y2')));
    ctx.strokeStyle=ln.getAttribute('stroke');
    ctx.lineWidth=parseFloat(ln.getAttribute('stroke-width'));
    ctx.stroke();
  });
  // Draw all text
  svgEl.querySelectorAll('text').forEach(txt=>{
    const x=parseFloat(txt.getAttribute('x'));
    const y=parseFloat(txt.getAttribute('y'));
    const fs=parseFloat(txt.getAttribute('font-size'));
    const fw=txt.getAttribute('font-weight')||'400';
    const fill=txt.getAttribute('fill');
    const anchor=txt.getAttribute('text-anchor')||'start';
    ctx.font=fw+' '+fs+'px Roboto,sans-serif';
    ctx.fillStyle=fill;
    ctx.textAlign=anchor==='middle'?'center':anchor==='end'?'right':'left';
    ctx.textBaseline='alphabetic';
    ctx.fillText(txt.textContent,x,y);
  });
  // Match SVG positioning
  canvas.style.cssText=svgEl.style.cssText;
  canvas.style.width=w+'px';
  canvas.style.height=Math.ceil(vbH*(w/vbW))+'px';
  svgEl.parentNode.replaceChild(canvas,svgEl);
}

      windowWidth:bodyW+50,windowHeight:bodyH+50,
      scale:2,useCORS:true,allowTaint:false,logging:false,
      backgroundColor:null,
      imageTimeout:15000
    });
    pdfOverlay.style.display='flex';
    pdfBar.style.width='85%';pdfStatus.textContent='Creating '+_label+'\u2026';
    const fname='WC2026_'+SIZE+'_'+TZ+'_'+THEME;
    if(_exportMode==='pdf'){
      const{jsPDF}=window.jspdf;
      const pSizes={'22x17':[22,17],'A3':[16.535,11.693],'24x16':[24,16]};
      const[pW,pH]=pSizes[SIZE]||[22,17];
      const pdf=new jsPDF({orientation:'landscape',unit:'in',format:[pH,pW]});
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,pW,pH);
      pdf.save(fname+'.pdf');
    } else {
      canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname+'.png';a.click();URL.revokeObjectURL(a.href)},'image/png');
    }
    pdfBar.style.width='100%';pdfStatus.textContent=_label+' Downloaded \u2714';
    setTimeout(()=>{pdfOverlay.remove()},2500);
  }catch(err){
    pdfStatus.textContent='Error: '+err.message;
    pdfStatus.style.color='#ff6666';
    console.error('PDF generation failed:',err);
  }
}
requestAnimationFrame(()=>setTimeout(generatePDF,500));
}
</script>
</body>
</html>
