<body>

<!-- ambient animated background (decorative) -->
<div class="bg-fx" aria-hidden="true">
  <span class="orb a"></span><span class="orb b"></span><span class="orb c"></span>
</div>

<!-- top nav -->
<nav class="nav">
  <a class="brand" href="./" aria-label="World Cup 2026 — home">
    <span class="ball" aria-hidden="true">⚽</span>
    <span><b>WC<span class="grad-text">26</span></b> <small>Live knockout hub</small></span>
  </a>
  <div class="nav-tools">
    <button class="iconbtn btn-sm" data-lang="en" title="English" aria-label="English">EN</button>
    <button class="iconbtn btn-sm" data-lang="es" title="Español" aria-label="Español">ES</button>
    <a class="btn btn-ghost btn-sm" href="chart.html">🖨️ Wall chart</a>
    <button class="iconbtn" id="theme-toggle" title="Toggle light / dark" aria-label="Toggle theme">◑</button>
  </div>
</nav>

<!-- knockout hub renders here -->
<div id="kapp"><p style="padding:120px 22px;text-align:center;color:#9aa6cf">Loading the bracket…</p></div>

<footer class="footer">
  <div class="wrap" id="hub-footer">
    <p class="made">Made with ☕ and 🏆 for the 2026 World Cup</p>
    <p>Live scores from <a href="https://www.espn.com/soccer/">ESPN’s</a> public feed, with <a href="https://github.com/openfootball/worldcup.json">openfootball</a> as a free fallback. Unofficial — confirm anything critical with the FIFA app or your broadcaster.</p>
    <p style="margin-top:8px">Built by <a href="https://github.com/jagnoor">@jagnoor</a></p>
  </div>
</footer>

<!-- schedule.js must load before knockout.js (provides window.WC_SCHEDULE) -->
<script src="schedule.js?v=2"></script>
<script src="feed.js?v=7"></script>
<script src="knockout.js?v=20"></script>
<script>
  // simple dark/light toggle (mirrors the landing page)
  document.getElementById('theme-toggle').addEventListener('click', function () {
    var h = document.documentElement;
    h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  // language switch — set ?lang= while preserving the active-tab #hash
  (function () {
    var cur = new URLSearchParams(location.search).get('lang') === 'es' ? 'es' : 'en';
    document.querySelectorAll('[data-lang]').forEach(function (b) {
      if (b.dataset.lang === cur) b.classList.add('on');
      b.addEventListener('click', function () {
        var u = new URL(location.href); u.searchParams.set('lang', b.dataset.lang); location.href = u.toString();
      });
    });
    // brand tagline + footer in Spanish when ?lang=es
    if (cur === 'es') {
      var tag = document.querySelector('.brand small'); if (tag) tag.textContent = 'Cuadro eliminatorio en vivo';
      var f = document.getElementById('hub-footer');
      if (f) f.innerHTML =
        '<p class="made">Hecho con ☕ y 🏆 para el Mundial 2026</p>' +
        '<p>Marcadores en vivo del feed público de <a href="https://www.espn.com/soccer/">ESPN</a>, con <a href="https://github.com/openfootball/worldcup.json">openfootball</a> como respaldo gratuito. No oficial — confirma lo importante con la app de la FIFA o tu canal.</p>' +
        '<p style="margin-top:8px">Creado por <a href="https://github.com/jagnoor">@jagnoor</a></p>';
    }
  })();
</script>
</body>
</html>
